# ROS 2 Control Configuration for Robotiq 2F-140 Gripper
# 
# This file configures the controller_manager and defines controllers
# for the Robotiq gripper when using the ros2_control hardware interface.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz - Control loop update rate

    # List of controllers
    gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController
    
    gripper_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


# Joint State Broadcaster
# Publishes joint states to /joint_states topic
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0  # Hz


# Gripper Action Controller
# Provides a GripperCommand action interface for controlling the gripper
# Action topic: /gripper_controller/gripper_cmd (control_msgs/action/GripperCommand)
gripper_controller:
  ros__parameters:
    # Joint to cntrol
    joint: finger_joint
    action_monitor_rate: 20.0  # Hz - How often to publish feedback
    goal_tolerance: 0.01  # radians (or meters depending on joint units)
    max_effort: 100.0  # Maximum effort to apply
    allow_stalling: true # If enabled, goal succeeds when gripper stalls (hits an object)
    stall_velocity_threshold: 0.001  # rad/s - Velocity below this is considered stalled
    stall_timeout: 1.0  # seconds - How long to wait at low velocity before declaring stall


# Gripper Trajectory Controller (Alternative to Gripper Action Controller)
# Provides trajectory-based control using FollowJointTrajectory action
# Action topic: /gripper_trajectory_controller/follow_joint_trajectory
# Use this for trajectory-based control or when implementing custom conversion layers
gripper_trajectory_controller:
  ros__parameters:
    joints:
      - finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0  # 0 = no time constraint
      finger_joint:
        trajectory: 0.1  # rad tolerance during trajectory
        goal: 0.05        # rad tolerance at goal
